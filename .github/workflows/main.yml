name: Build and publish plugin

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Fetch ArchiSteamFarm reference assembly
        env:
          ASF_VERSION: 6.3.7.0
        run: |
          curl -sSL -o /tmp/ASF-generic.zip "https://github.com/JustArchiNET/ArchiSteamFarm/releases/download/${ASF_VERSION}/ASF-generic.zip"
          unzip -o /tmp/ASF-generic.zip ArchiSteamFarm.dll -d ..

      - name: Restore
        run: dotnet restore ASFUnpaidStuff.csproj

      - name: Build
        run: dotnet build ASFUnpaidStuff.csproj --configuration Release --no-restore

      - name: Pack plugin zip
        shell: pwsh
        run: |
          $publishDir = "bin/Release/net10.0"
          $artifactDir = "artifacts"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          Compress-Archive -Path "$publishDir/ASFUnpaidStuff.dll", "$publishDir/ASFUnpaidStuff.pdb", "$publishDir/ASFUnpaidStuff.deps.json" -DestinationPath "$artifactDir/ASFUnpaidStuff.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ASFUnpaidStuff
          path: artifacts/ASFUnpaidStuff.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/ASFUnpaidStuff.zip
